<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Mine The Ore</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="screen">
      <h1>Mine The Ore</h1>
      <button class="btn" id="start-btn">Play Game</button>
    </div>

    <div class="screen">
      <h1>What is your "favorite" ore?</h1>
      <ul class="insects-list">
        <li>
          <button class="choose-insect-btn">
            <p>Copper</p>
            <img src="img/Copper.webp" alt="copper">
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Iron</p>
            <img
               src="img/Iron.png"
               alt="iron"
               />
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Gold</p>
            <img
               src="img/Gold.png"
               alt="gold"
               />
          </button>
        </li>
        <li>
          <button class="choose-insect-btn">
            <p>Diamond</p>
            <img
               src="img/Diamond.png"
               alt="diamond"
               />
          </button>
        </li>
      </ul>
    </div>

    <div class="screen game-container" id="game-container">
      <h3 id="time" class="time">Time: 00:00</h3>
      <h3 id="score" class="score">Score: 0</h3>
      <h5 id="message" class="message">
        Are you annoyed yet? <br>
        You are playing an impossible game!
      </h5>
    </div>
  </body>
</html>
